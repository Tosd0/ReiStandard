name: Release

on:
  push:
    tags:
      # Per-package release tags only. Historical `v*` tags (v2.1.0, etc.)
      # were left over from when this repo was a single package — the root
      # package.json is now `private: true` with no version field, so a
      # `v*` tag has no semantic meaning here. Manual sweep-all is still
      # available via `workflow_dispatch`.
      - 'rei-standard-amsg-*@*'
  workflow_dispatch:

# Belt-and-suspenders: even though scripts/publish-workspaces.mjs already
# filters publishes to the tag-targeted package (so parallel runs cannot
# step on each other's `npm publish`), a single shared concurrency group
# serializes Release runs. That keeps logs tidy when several per-package
# tags are pushed together, and guarantees we never get a `403 You cannot
# publish over the previously published versions` race if the filter ever
# regresses. `cancel-in-progress: false` is important — half-finished
# publishes must never be killed mid-flight.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pin to 22.22.3 to dodge the broken bundled npm in the runner image's
          # toolcache. Background:
          #   - Node 22.22.2 (which the toolcache still ships) bundles a broken
          #     npm 10.9.7 missing the `promise-retry` module — any attempt to
          #     self-upgrade npm via `npm install -g npm@<x>` fails with
          #     MODULE_NOT_FOUND from @npmcli/arborist/lib/arborist/rebuild.js.
          #   - The fix landed upstream in Node 22.22.3 (nodejs/node#62463,
          #     npm/cli#9152), but actions/runner-images#13883 is still open
          #     so the GitHub-hosted runner toolcache hasn't been refreshed.
          #   - Asking setup-node for a specific patch the cache doesn't have
          #     forces a fresh download from nodejs.org — giving us the fixed
          #     bundled npm without the self-upgrade dance.
          # Remove this pin (revert to `node-version: 22`) once #13883 is closed.
          node-version: '22.22.3'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        # OIDC trusted publishing needs npm >= 11.5.1. With the 22.22.3 pin
        # above the bundled npm 10.9.8 self-upgrades cleanly.
        run: npm install -g npm@^11.5.1

      - name: Remove deprecated npm config
        run: npm config delete always-auth || true

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm run ci

      - name: Publish public workspaces
        env:
          NPM_PUBLISH_PROVENANCE: 'true'
        run: npm run publish:workspaces
